name: 💡 Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea for Careless Whisper? We'd love to hear it!

  - type: textarea
    id: description
    attributes:
      label: What would you like to see?
      description: Describe the feature or improvement you have in mind.
    validations:
      required: true

  - type: textarea
    id: use_case
    attributes:
      label: Why would this be useful?
      description: How would you use this feature? What problem does it solve?

  - type: dropdown
    id: platform
    attributes:
      label: Which platform is this for?
      options:
        - All platforms
        - macOS
        - Windows
        - Linux
